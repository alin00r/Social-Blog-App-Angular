<section class="mx-auto w-full max-w-3xl px-4 py-6 sm:px-6 lg:px-8">
  <div class="mb-5 flex items-center justify-between gap-3">
    <div>
      <p class="mb-2 text-xs font-semibold uppercase tracking-[0.24em] text-blue-600">Groups</p>
      <h1 class="text-3xl font-semibold tracking-tight text-slate-900">Create group</h1>
      <p class="mt-2 text-sm text-slate-600">Create a new group in a dedicated page.</p>
    </div>

    <button
      type="button"
      class="inline-flex h-11 items-center justify-center rounded-xl border border-slate-300 bg-white px-4 text-sm font-medium text-slate-700 transition hover:bg-slate-100"
      (click)="goBack()"
    >
      Back
    </button>
  </div>

  <article class="rounded-[24px] border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
    <form [formGroup]="createGroupForm" (ngSubmit)="submit()" class="grid gap-4 md:grid-cols-2">
      <div class="md:col-span-1">
        <label class="mb-2 block text-sm font-medium text-slate-700">Title</label>
        <input
          formControlName="title"
          class="h-11 w-full rounded-xl border border-slate-300 bg-white px-4 text-sm text-slate-800 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
          type="text"
          placeholder="Group title"
        />
      </div>

      <div class="md:col-span-1">
        <label class="mb-2 block text-sm font-medium text-slate-700">Image</label>
        <input
          class="block h-11 w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-600 file:mr-3 file:rounded-lg file:border-0 file:bg-slate-100 file:px-3 file:py-2 file:text-sm file:font-medium file:text-slate-700 hover:file:bg-slate-200"
          type="file"
          accept="image/*"
          (change)="onImageSelected($event)"
        />
      </div>

      <div class="md:col-span-2">
        <label class="mb-2 block text-sm font-medium text-slate-700">Description</label>
        <textarea
          formControlName="description"
          class="min-h-[140px] w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-800 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
          rows="5"
          placeholder="Write a short description for the group"
        ></textarea>
      </div>

      <div
        *ngIf="errorMessage"
        class="md:col-span-2 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700"
      >
        {{ errorMessage }}
      </div>

      <div class="md:col-span-2 flex justify-end gap-3 pt-2">
        <button
          type="button"
          class="inline-flex h-11 items-center justify-center rounded-xl border border-slate-300 bg-white px-5 text-sm font-medium text-slate-700 transition hover:bg-slate-100"
          (click)="goBack()"
        >
          Cancel
        </button>

        <button
          type="submit"
          [disabled]="loading"
          class="inline-flex h-11 items-center justify-center rounded-xl bg-blue-600 px-5 text-sm font-medium text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-60"
        >
          {{ loading ? 'Creating...' : 'Create group' }}
        </button>
      </div>
    </form>
  </article>
</section>
