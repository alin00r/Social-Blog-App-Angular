<section class="sb-card mx-auto max-w-md rounded-2xl p-6">
  <h1 class="mb-6 text-2xl font-bold text-[#1b2742]">Create account</h1>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="mb-1 block text-sm font-medium text-[#51627f]">Full Name</label>
      <input formControlName="name" type="text" class="sb-input w-full rounded-lg px-3 py-2" />
      <p
        class="mt-1 text-sm text-red-500"
        *ngIf="registerForm.controls.name.touched && registerForm.controls.name.invalid"
      >
        Full name must be at least 3 characters.
      </p>
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium text-[#51627f]">Email</label>
      <input formControlName="email" type="email" class="sb-input w-full rounded-lg px-3 py-2" />
      <p
        class="mt-1 text-sm text-red-500"
        *ngIf="registerForm.controls.email.touched && registerForm.controls.email.invalid"
      >
        Valid email is required.
      </p>
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium text-[#51627f]">Password</label>
      <input
        formControlName="password"
        type="password"
        class="sb-input w-full rounded-lg px-3 py-2"
      />
      <p
        class="mt-1 text-sm text-red-500"
        *ngIf="registerForm.controls.password.touched && registerForm.controls.password.invalid"
      >
        Password must be at least 6 characters.
      </p>
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium text-[#51627f]">Confirm Password</label>
      <input
        formControlName="passwordConfirm"
        type="password"
        class="sb-input w-full rounded-lg px-3 py-2"
      />
      <p
        class="mt-1 text-sm text-red-500"
        *ngIf="
          registerForm.controls.passwordConfirm.touched &&
          registerForm.controls.passwordConfirm.invalid
        "
      >
        Please confirm your password.
      </p>
      <p
        class="mt-1 text-sm text-red-500"
        *ngIf="
          registerForm.errors?.['passwordMismatch'] && registerForm.controls.passwordConfirm.touched
        "
      >
        Passwords do not match.
      </p>
    </div>

    <button
      type="submit"
      [disabled]="loading"
      class="sb-btn-primary w-full rounded-lg px-4 py-2 font-medium disabled:opacity-60 min-h-10 flex items-center justify-center"
    >
      <span
        *ngIf="loading"
        class="inline-block mr-2 h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"
      ></span>
      {{ loading ? 'Loading' : 'Create account' }}
    </button>
  </form>

  <div class="mt-6 text-center">
    <p class="text-sm text-[#637394]">
      Already have an account?
      <a routerLink="/login" class="sb-link font-medium"> Sign in </a>
    </p>
  </div>
</section>
