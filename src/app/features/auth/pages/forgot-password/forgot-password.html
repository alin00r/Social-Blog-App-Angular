<section class="sb-card mx-auto max-w-md rounded-2xl p-6">
  <h1 class="mb-2 text-2xl font-bold text-[#1b2742]">Forgot Password?</h1>
  <p class="mb-6 text-sm text-[#637394]">
    Enter your email address and we'll send you a reset code.
  </p>

  <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="mb-1 block text-sm font-medium text-[#51627f]">Email Address</label>
      <input formControlName="email" type="email" class="sb-input w-full rounded-lg px-3 py-2" />
      <p
        class="mt-1 text-sm text-red-500"
        *ngIf="
          forgotPasswordForm.controls.email.touched && forgotPasswordForm.controls.email.invalid
        "
      >
        Valid email is required.
      </p>
    </div>

    <button
      type="submit"
      [disabled]="loading"
      class="sb-btn-primary w-full rounded-lg px-4 py-2 font-medium disabled:opacity-60 min-h-10 flex items-center justify-center"
    >
      <span
        *ngIf="loading"
        class="inline-block mr-2 h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"
      ></span>
      {{ loading ? 'Sending' : 'Send Reset Code' }}
    </button>
  </form>

  <div class="mt-6 text-center">
    <p class="text-sm text-[#637394]">
      Remember your password?
      <a routerLink="/login" class="sb-link font-medium"> Back to Login </a>
    </p>
  </div>
</section>
